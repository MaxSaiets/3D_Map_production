# =============================================================
# Nginx конфіг для 3dMAP
# Розмістити: /etc/nginx/sites-available/3dmap
# Активувати: ln -s /etc/nginx/sites-available/3dmap /etc/nginx/sites-enabled/3dmap
# =============================================================

# Розмір тіла запиту — потрібно для завантаження великих OSM зон
client_max_body_size 50M;

server {
    listen 80;
    listen [::]:80;

    # Замінити на реальний домен або IP
    server_name 209.38.210.197 _;

    # ── Заголовки безпеки ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Вимикаємо показ версії nginx
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf font/opentype
               image/svg+xml;

    # ── Next.js Frontend ─────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── FastAPI Backend ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Генерація може займати кілька хвилин
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Next.js статичні файли (_next/static) ─────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Логи ──────────────────────────────────────────────────
    access_log /var/log/nginx/3dmap.access.log;
    error_log  /var/log/nginx/3dmap.error.log;
}

