name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: CI — TypeScript + build check
  # ─────────────────────────────────────────────────────────────
  ci:
    name: CI Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Next.js build check
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy — SSH на сервер, git pull, restart
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "=== [1/5] Git pull ==="
            cd /opt/3dmap
            git pull origin main

            echo "=== [2/5] Backend deps ==="
            cd /opt/3dmap/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "=== [3/5] Frontend build ==="
            cd /opt/3dmap/frontend
            npm ci --prefer-offline
            npm run build

            echo "=== [4/5] Restart services ==="
            pm2 restart 3dmap-backend 3dmap-frontend --update-env

            echo "=== [5/5] Save PM2 state ==="
            pm2 save

            echo "=== Deploy complete ==="
